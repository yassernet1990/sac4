name: Replace hero video
on:
  push:
    branches: [main]
    paths: ['.github/workflows/animate-strip.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace homepage background video
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          old = 'https://videos.pexels.com/video-files/6194507/6194507-hd_1920_1080_25fps.mp4'
          new = 'https://videos.pexels.com/video-files/10472330/10472330-hd_1920_1080_25fps.mp4'
          if old not in s:
              raise SystemExit('Current hero video URL not found')
          p.write_text(s.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git commit -m "Use container handler hero video" || exit 0
          git push
