name: Activate logistics themes v4
on:
  push:
    branches: [main]
    paths: ['.github/workflows/activate-theme-v4.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache-bust theme runtime
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          s=s.replace('src="theme-loader.js"','src="theme-loader.js?v=4"')
          p.write_text(s,encoding='utf-8')
          PY
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git commit -m "Load logistics themes v4 without stale cache" || exit 0
          git push