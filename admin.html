<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SAC Identity Admin</title><script src="theme-loader.js"></script><link rel="stylesheet" href="themes.css"><style>*{box-sizing:border-box}body{margin:0;background:#0d1117;color:#fff;font-family:Arial,sans-serif;padding:42px}header{max-width:1180px;margin:auto auto 30px;display:flex;justify-content:space-between;align-items:center;gap:20px}h1{margin:0;font-size:34px}p{color:#aeb7c2}.back{color:#fff;text-decoration:none;border:1px solid #ffffff33;padding:12px 16px}.grid{max-width:1180px;margin:auto;display:grid;grid-template-columns:repeat(2,1fr);gap:18px}.theme{position:relative;border:1px solid #ffffff22;background:#161b22;padding:0;cursor:pointer;text-align:right;overflow:hidden;min-height:240px;transition:.25s}.theme:hover{transform:translateY(-4px);border-color:#fff}.preview{height:145px;background:var(--paper);position:relative;overflow:hidden}.preview:before{content:"SAC LOGISTICS";position:absolute;right:22px;top:22px;color:var(--navy);font-weight:900;font-size:22px}.preview:after{content:"FORKLIFTS • WAREHOUSE • RENTAL";position:absolute;right:22px;bottom:22px;background:var(--yellow);color:var(--navy);font-weight:900;padding:9px 12px;font-size:11px}.bar{height:28px;background:var(--navy)}.info{padding:18px}.info strong{display:block;font-size:20px}.info span{color:#aeb7c2;font-size:13px}.active{outline:3px solid #fff}.active .info:after{content:"الهوية الحالية";display:inline-block;margin-top:12px;background:#fff;color:#111;padding:6px 9px;font-size:11px;font-weight:800}@media(max-width:700px){body{padding:22px}.grid{grid-template-columns:1fr}header{align-items:flex-start;flex-direction:column}}</style></head><body><header><div><h1>هويات SAC Logistics</h1><p>اضغط على الهوية لتطبيقها والانتقال مباشرة إلى الموقع.</p></div><a class="back" href="index.html">فتح الموقع</a></header><main class="grid" id="grid"></main><script>const items=[['industrial','الصناعية الصفراء','هوية معدات وسلامة قوية'],['saudi','السعودية الخضراء','طابع محلي راقٍ'],['port','الموانئ الزرقاء','شحن وموانئ وسلاسل إمداد'],['desert','الصحراوية البرونزية','دفء صناعي سعودي'],['steel','الفولاذية الرمادية','مظهر هندسي ثقيل'],['safety','سلامة برتقالية','هوية تشغيل ومواقع'],['cold','سلاسل التبريد','نظيفة وباردة وحديثة'],['cargo','الشحن الحمراء','قوية وسريعة'],['luxury','السوداء الفاخرة','مؤسسية راقية'],['sand','الحجرية الرملية','ناعمة وعمرانية']];const current=localStorage.getItem('sacTheme')||'industrial';grid.innerHTML=items.map(x=>`<button class="theme ${x[0]===current?'active':''}" data-theme="${x[0]}"><div class="preview" data-theme="${x[0]}"><div class="bar"></div></div><div class="info"><strong>${x[1]}</strong><span>${x[2]}</span></div></button>`).join('');document.querySelectorAll('.theme').forEach(b=>b.onclick=()=>{localStorage.setItem('sacTheme',b.dataset.theme);location.href='index.html'});</script></body></html>
