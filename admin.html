<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SAC Identity Admin</title><script src="theme-loader.js"></script><link rel="stylesheet" href="themes.css"><style>*{box-sizing:border-box}body{margin:0;background:#0b0f14;color:#fff;font-family:Arial,sans-serif;padding:42px}header{max-width:1220px;margin:auto auto 30px;display:flex;justify-content:space-between;align-items:center;gap:20px}h1{margin:0;font-size:36px}p{color:#aeb7c2}.back{color:#fff;text-decoration:none;border:1px solid #ffffff33;padding:12px 16px}.grid{max-width:1220px;margin:auto;display:grid;grid-template-columns:repeat(2,1fr);gap:20px}.theme{position:relative;border:1px solid #ffffff20;background:#141a20;padding:0;cursor:pointer;text-align:right;overflow:hidden;min-height:270px;transition:.25s}.theme:hover{transform:translateY(-5px);border-color:#fff}.preview{height:174px;background:var(--paper);position:relative;overflow:hidden;border-bottom:1px solid #ffffff18}.preview:before{content:"SAC LOGISTICS";position:absolute;right:24px;top:25px;color:var(--navy);font-weight:900;font-size:22px}.preview:after{content:"MATERIAL HANDLING\A Built for uptime";white-space:pre;position:absolute;right:24px;bottom:22px;background:var(--badge-bg);color:var(--badge-fg);border:var(--badge-border);box-shadow:var(--badge-shadow);border-radius:var(--badge-radius);transform:scale(.78);transform-origin:bottom right;font-weight:900;padding:13px 16px;font-size:11px;line-height:1.45}.bar{height:31px;background:var(--navy)}.info{padding:19px}.info strong{display:block;font-size:21px}.info span{display:block;color:#aeb7c2;font-size:13px;margin-top:6px}.active{outline:3px solid #fff}.active .info:after{content:"الهوية الحالية";display:inline-block;margin-top:12px;background:#fff;color:#111;padding:6px 9px;font-size:11px;font-weight:800}@media(max-width:700px){body{padding:22px}.grid{grid-template-columns:1fr}header{align-items:flex-start;flex-direction:column}}</style></head><body><header><div><h1>هويات SAC Logistics الجديدة</h1><p>اضغط على أي هوية لتطبيقها فوراً والانتقال إلى الموقع.</p></div><a class="back" href="index.html">فتح الموقع</a></header><main class="grid" id="grid"></main><script>const items=[['industrial','Industrial Core','صناعية قوية وواضحة'],['graphite','Graphite Engineering','فولاذية هندسية راقية'],['royal','Royal Logistics','كحلي وذهبي مؤسسي'],['emerald','Saudi Emerald','خضراء سعودية راقية'],['oxide','Oxide Yard','نحاسية جريئة للمعدات'],['polar','Polar Chain','باردة ونظيفة للمستودعات'],['crimson','Crimson Cargo','حمراء قوية للشحن'],['ivory','Ivory Operations','فاتحة وفاخرة وهادئة'],['night','Black Gold','سوداء وذهبية فخمة'],['signal','Signal Orange','تشغيل وسلامة بصرية قوية']];const current=localStorage.getItem('sacTheme')||'industrial';grid.innerHTML=items.map(x=>`<button class="theme ${x[0]===current?'active':''}" data-theme="${x[0]}"><div class="preview" data-theme="${x[0]}"><div class="bar"></div></div><div class="info"><strong>${x[1]}</strong><span>${x[2]}</span></div></button>`).join('');document.querySelectorAll('.theme').forEach(b=>b.onclick=()=>{localStorage.setItem('sacTheme',b.dataset.theme);location.href='index.html?theme='+Date.now()});</script></body></html>
