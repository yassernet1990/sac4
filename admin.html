<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SAC Logistics — Identity Admin</title><script src="theme-loader.js?v=4"></script><style>*{box-sizing:border-box}body{margin:0;background:#0d1117;color:#fff;font-family:Arial,sans-serif;padding:42px}header{max-width:1200px;margin:auto auto 30px;display:flex;justify-content:space-between;align-items:center;gap:20px}h1{margin:0;font-size:34px}p{color:#aeb7c2;line-height:1.7}.back{color:#fff;text-decoration:none;border:1px solid #ffffff33;padding:12px 16px}.grid{max-width:1200px;margin:auto;display:grid;grid-template-columns:repeat(2,1fr);gap:18px}.theme{position:relative;border:1px solid #ffffff22;background:#161b22;padding:0;cursor:pointer;text-align:right;overflow:hidden;min-height:250px;transition:.25s}.theme:hover{transform:translateY(-4px);border-color:#fff}.preview{height:160px;position:relative;overflow:hidden;background:var(--paper)}.preview:before{content:'SAC LOGISTICS';position:absolute;right:22px;top:22px;color:var(--navy);font-weight:900;font-size:22px}.preview:after{content:'MOVE. STORE. DELIVER.';position:absolute;right:22px;bottom:22px;background:var(--yellow);color:var(--navy);font-weight:900;padding:10px 13px;font-size:11px}.bar{height:30px;background:var(--navy)}.badgeDemo{position:absolute;left:22px;bottom:18px;width:110px;height:58px;background:var(--yellow);border:2px solid var(--navy);box-shadow:6px 6px 0 var(--navy)}.info{padding:18px}.info strong{display:block;font-size:20px}.info span{color:#aeb7c2;font-size:13px;line-height:1.6}.active{outline:3px solid #fff}.active .info:after{content:'الهوية الحالية';display:inline-block;margin-top:12px;background:#fff;color:#111;padding:6px 9px;font-size:11px;font-weight:800}@media(max-width:700px){body{padding:22px}.grid{grid-template-columns:1fr}header{align-items:flex-start;flex-direction:column}}</style></head><body><header><div><h1>هويات SAC Logistics</h1><p>عشر مدارس مستخدمة حالياً في قطاع اللوجستيات: الشحن السريع، البحري، الموانئ، الجوي، الطرود، البريد، الميل الأخير، المستودعات، التبريد، والشحن البري.</p></div><a class="back" href="index.html">فتح الموقع</a></header><main class="grid" id="grid"></main><script>const items=[['express','Express Yellow','مدرسة الشحن السريع: أصفر قوي، أحمر، ورسائل مباشرة'],['ocean','Ocean Blue','مدرسة الشحن البحري والحاويات: أزرق مؤسسي هادئ'],['ports','Port Operations','مدرسة الموانئ والمناولة الثقيلة: كحلي وبرتقالي سلامة'],['air','Air Cargo','مدرسة الشحن الجوي: ألوان سريعة وحركة بصرية حديثة'],['parcel','Parcel Network','مدرسة الطرود العالمية: أسود وبرتقالي وواجهة عملية'],['postal','National Post','مدرسة البريد الوطني: أخضر مؤسسي وذهبي متزن'],['lastmile','Last Mile','مدرسة التوصيل الحضري: أزرق وتيركواز وحواف مرنة'],['warehouse','Warehouse Pro','مدرسة المستودعات الصناعية: جرافيت وفولاذ'],['coldchain','Cold Chain','مدرسة سلاسل التبريد: أزرق جليدي ونظافة عالية'],['freight','Road Freight','مدرسة الشحن البري: أحمر داكن وطابع قوي']];const current=localStorage.getItem('sacTheme')||'express';const vars={express:['#b5121b','#ffd400','#fffdf3'],ocean:['#003b5c','#8ed8f8','#f2f8fb'],ports:['#102a43','#ff8a00','#f4f6f8'],air:['#3d0c5f','#ff4fa3','#fbf5fc'],parcel:['#111111','#f58220','#f5f3ef'],postal:['#143a2f','#d9c26c','#f5f4ed'],lastmile:['#10243d','#00c2a8','#f0f8f7'],warehouse:['#262c31','#c6d0d7','#f0f2f3'],coldchain:['#073a52','#b9f0f4','#edf9fb'],freight:['#3a1719','#e54b4f','#f7efef']};grid.innerHTML=items.map(x=>{const v=vars[x[0]];return `<button class="theme ${x[0]===current?'active':''}" data-theme="${x[0]}"><div class="preview" style="--navy:${v[0]};--yellow:${v[1]};--paper:${v[2]}"><div class="bar"></div><div class="badgeDemo"></div></div><div class="info"><strong>${x[1]}</strong><span>${x[2]}</span></div></button>`}).join('');document.querySelectorAll('.theme').forEach(b=>b.onclick=()=>{localStorage.setItem('sacTheme',b.dataset.theme);location.href='index.html?theme='+b.dataset.theme+'&v=4'});</script></body></html>
